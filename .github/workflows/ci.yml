name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev,mcp]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy src

      - name: Validate canonical content
        run: agentic-book --content-root content validate-content --strict-freshness

      - name: Build local index
        run: agentic-book --content-root content --data-dir .agentic-book-data ingest

      - name: Inspect runtime capabilities
        run: agentic-book capabilities --json

      - name: Evaluate retrieval matrix
        run: agentic-book --content-root content --data-dir .agentic-book-data eval-matrix --write-report evals/reports/matrix.json

      - name: Write latest guarded retrieval report
        run: agentic-book --content-root content --data-dir .agentic-book-data eval-retrieval --profile guarded --write-report evals/reports/latest.json

      - name: Evaluate fusion retrieval
        run: agentic-book --content-root content --data-dir .agentic-book-data eval-fusion --write-report evals/reports/fusion.json

      - name: Run tests
        run: python -m pytest

      - name: Inspect MCP surface
        run: fastmcp list src/agentic_book/interfaces/mcp/server.py --resources --prompts --json

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agentic-book:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
